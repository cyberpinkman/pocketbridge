name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  node:
    name: Node bridge checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check local demo environment
        run: npm run env:check

      - name: Run LAN pairing preflight
        run: npm run demo:lan-check
