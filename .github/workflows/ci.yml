name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server contract and smoke checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for UI smoke
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Demo smoke
        run: npm run demo:smoke

      - name: UI smoke
        run: npm run demo:ui-smoke

      - name: LAN preflight
        run: npm run demo:lan-check

  mobile_flutter:
    name: Flutter Android checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        timeout-minutes: 20
        run: flutter build apk --debug --no-pub
