name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node bridge checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check local demo environment
        run: npm run env:check

      - name: Run LAN pairing preflight
        run: npm run demo:lan-check

  mobile_flutter:
    name: Flutter Android checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        timeout-minutes: 20
        run: flutter build apk --debug --no-pub

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketbridge-mobile-debug-apk
          path: apps/mobile_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
