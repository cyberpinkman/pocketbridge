<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PocketBridge Mobile</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell mobile-shell">
      <section class="topbar">
        <div>
          <h1>PocketBridge</h1>
          <p id="status">Starting</p>
        </div>
      </section>

      <section class="panel controls">
        <div class="section-head">
          <h2>Send to Mac</h2>
          <span id="deviceName"></span>
        </div>

        <form id="textForm" class="stack">
          <input id="textTitle" name="title" placeholder="Title" />
          <textarea id="textBody" name="text" rows="5" placeholder="Text, idea, link, note"></textarea>
          <button type="submit">Upload text</button>
        </form>

        <form id="fileForm" class="stack">
          <input id="fileInput" name="file" type="file" />
          <button type="submit">Upload file</button>
        </form>
      </section>

      <section class="panel inbox">
        <div class="section-head">
          <h2>From Mac</h2>
          <button id="refresh">Refresh</button>
        </div>
        <div id="items" class="items"></div>
      </section>
    </main>

    <script type="module" src="/mobile.js"></script>
  </body>
</html>
