name: pocketbridge_mobile
description: PocketBridge mobile MVP for pairing, capture upload, and phone share review.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.3
  flutter:
    sdk: flutter
  http: ^1.6.0
  http_parser: ^4.1.2
  mime: ^2.0.0
  mobile_scanner: ^7.2.0
  open_filex: ^4.7.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
